<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200">
  <defs>
    <linearGradient id="xGradient" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="rgb(92,128,128)" />
      <stop offset="50%" stop-color="rgb(128,128,128)" />
      <stop offset="100%" stop-color="rgb(164,128,128)" />
    </linearGradient>

    <linearGradient id="yGradient" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="rgb(128,92,128)" />
      <stop offset="50%" stop-color="rgb(128,128,128)" />
      <stop offset="100%" stop-color="rgb(128,164,128)" />
    </linearGradient>

    <radialGradient id="edgeMaskGradient" cx="50%" cy="50%" r="72%">
      <stop offset="0%" stop-color="black" />
      <stop offset="62%" stop-color="black" />
      <stop offset="84%" stop-color="white" />
      <stop offset="100%" stop-color="white" />
    </radialGradient>

    <mask id="edgeMask">
      <rect width="1200" height="1200" fill="url(#edgeMaskGradient)" />
      <rect x="150" y="150" width="900" height="900" rx="230" fill="black" />
      <rect x="108" y="108" width="984" height="984" rx="260" fill="black" opacity="0.4" />
    </mask>
  </defs>

  <rect width="1200" height="1200" fill="rgb(128,128,128)" />
  <rect width="1200" height="1200" fill="url(#xGradient)" mask="url(#edgeMask)" opacity="0.95" />
  <rect width="1200" height="1200" fill="url(#yGradient)" mask="url(#edgeMask)" opacity="0.95" />
</svg>
